<!doctype html>
<meta charset="utf-8"><title>custom WGSL per-click pipeline — full-graph validation vs ORT</title>
<body style="font:13px ui-monospace,monospace;white-space:pre-wrap;padding:1rem" id="o">
<script type="module">
import { initDevice, makeRunner, toF16, fromF16, U } from './wgpu-net.js?v=6';
const o=document.getElementById('o'); const log=s=>{o.textContent+=s+'\n'; console.log(s);};
const POST=x=>{try{fetch('/wgpu_net_result',{method:'POST',body:JSON.stringify(x)});}catch(e){}};
const P = +(new URLSearchParams(location.search).get('p')||64);
const NOTEST = new URLSearchParams(location.search).has('notest');
const BASE=`perclick_${P}`;

(async()=>{
try{
  const {dev,info}=await initDevice(); const R=makeRunner(dev);
  log(`device ${info.description||''} | graph ${BASE}`);
  const graph=await (await fetch(`models/pathA/${BASE}.graph.json`)).json();
  const wblob=new Uint16Array(await (await fetch(`models/pathA/${BASE}.weights.bin`)).arrayBuffer());
  const prod=s=>s.reduce((a,b)=>a*b,1);
  const mkbuf=(bytes,extra=0)=>dev.createBuffer({size:Math.max(16,bytes),usage:U.STORAGE|U.COPY_SRC|U.COPY_DST|extra});

  // weight buffers
  const W={}; for(const [name,w] of Object.entries(graph.weights)){ const b=mkbuf(w.numel*2); dev.queue.writeBuffer(b,0,wblob.subarray(w.offset,w.offset+w.numel)); W[name]=b; }
  // activation buffers (all tensors)
  const T={}; for(const [name,shp] of Object.entries(graph.tensors)) T[name]=mkbuf(prod(shp)*2);
  // inputs (from ORT ref; skipped in NOTEST timing mode -> zero inputs, data-independent timing)
  if(!NOTEST) for(const inp of graph.inputs){ const f=new Float32Array(await (await fetch(`models/pathA/ref/${inp.name}.f32`)).arrayBuffer());
    dev.queue.writeBuffer(T[inp.name],0,toF16(f)); }
  const zeroCache={}; const zeroBias=C=>{ if(!zeroCache[C]){ zeroCache[C]=mkbuf(C*2); } return zeroCache[C]; };
  const shpOf=n=> graph.tensors[n] || graph.weights[n]?.shape;

  // fusion: InstanceNorm whose SOLE consumer is a LeakyRelu -> apply leaky inside IN (skip the leaky node)
  const consumers={}; for(const nd of graph.nodes) for(const i of nd.in){ (consumers[i]=consumers[i]||[]).push(nd); }
  const skip=new Set(); const fuseOut={};
  for(const nd of graph.nodes){ if(nd.op==='InstanceNormalization'){ const c=consumers[nd.out[0]];
    if(c && c.length===1 && c[0].op==='LeakyRelu'){ skip.add(c[0]); fuseOut[nd.out[0]]=c[0].out[0]; } } }
  let fused=0;
  // build a static plan ONCE (pre-create all uniform + stats buffers), then re-record cheaply per run
  const plan=[];
  for(const nd of graph.nodes){
    if(skip.has(nd)) continue;
    const inb=nd.in.map(n=> T[n]||W[n]), out=T[nd.out[0]];
    if(nd.op==='Conv'){
      const os=graph.tensors[nd.out[0]], is=graph.tensors[nd.in[0]];
      const Co=nd.Co,Ci=nd.Ci,OD=os[2],OH=os[3],OW=os[4],ID=is[2],IH=is[3],IW=is[4];
      const Nvox=OD*OH*OW,nN=Math.ceil(Nvox/64),gx=Math.min(65535,nN);
      const bias=nd.bias?W[nd.in[2]]:zeroBias(Co); const u=R.uni([Ci,Co,OD,OH,OW,ID,IH,IW,nd.K,nd.S,nd.pad,gx]);
      plan.push(e=>R.pass(e,R.CONV,[inb[0],inb[1],bias,out,u],[gx,Math.ceil(Co/64),Math.ceil(nN/gx)]));
    } else if(nd.op==='InstanceNormalization'){
      const s=graph.tensors[nd.out[0]]; const C=s[1],N=s[2]*s[3]*s[4]; const stats=mkbuf(C*2*4);
      const u1=R.uni([C,N]); const {gx,wg}=R.grid(C*N); const u2=R.uni([C,N,gx]);
      const fo=fuseOut[nd.out[0]]; const dst=fo?T[fo]:out; const applyK=fo?R.IN_APPLY_LEAKY:R.IN_APPLY; if(fo)fused++;
      plan.push(e=>{R.pass(e,R.IN_STATS,[inb[0],stats,u1],[C,1,1]); R.pass(e,applyK,[inb[0],stats,inb[1],inb[2],dst,u2],wg);});
    } else if(nd.op==='LeakyRelu'){
      const n=prod(graph.tensors[nd.out[0]]); const {gx,wg}=R.grid(n); const u=R.uni([n,gx]);
      plan.push(e=>R.pass(e,R.LEAKY,[inb[0],out,u],wg));
    } else if(nd.op==='Add'){
      const n=prod(graph.tensors[nd.out[0]]); const {gx,wg}=R.grid(n); const u=R.uni([n,gx]);
      plan.push(e=>R.pass(e,R.ADD,[inb[0],inb[1],out,u],wg));
    } else if(nd.op==='Concat'){
      const parts=nd.in.map(inp=>({buf:T[inp],bytes:prod(shpOf(inp))*2}));
      plan.push(e=>{let off=0; for(const p of parts){ e.copyBufferToBuffer(p.buf,0,out,off,p.bytes); off+=p.bytes; }});
    } else if(nd.op==='AveragePool'||nd.op==='MaxPool'){
      const os=graph.tensors[nd.out[0]],is=graph.tensors[nd.in[0]]; const C=os[1],Nout=C*os[2]*os[3]*os[4];
      const {gx,wg}=R.grid(Nout); const u=R.uni([C,os[2],os[3],os[4],is[2],is[3],is[4],nd.kernel,nd.S,gx]); const mx=nd.op==='MaxPool';
      plan.push(e=>R.pass(e,R.POOL(mx),[inb[0],out,u],wg));
    } else if(nd.op==='Resize'){
      const os=graph.tensors[nd.out[0]],is=graph.tensors[nd.in[0]]; const C=os[1],Nout=C*os[2]*os[3]*os[4];
      const {gx,wg}=R.grid(Nout); const u=R.uni([C,os[2],os[3],os[4],is[2],is[3],is[4],gx]);
      plan.push(e=>R.pass(e,R.RESIZE,[inb[0],out,u],wg));
    } else throw new Error('unhandled op '+nd.op);
  }
  const runOnce=(enc)=>{ for(const p of plan) p(enc); };

  // run once (warm) + validate
  { const enc=dev.createCommandEncoder(); runOnce(enc); dev.queue.submit([enc.finish()]); await dev.queue.onSubmittedWorkDone(); }
  const outName=graph.outputs[0].name, outShp=graph.tensors[outName], outN=prod(outShp);
  let md=null, sign=null;
  if(!NOTEST){
  const rb=dev.createBuffer({size:outN*2,usage:U.MAP_READ|U.COPY_DST}); { const e=dev.createCommandEncoder(); e.copyBufferToBuffer(T[outName],0,rb,0,outN*2); dev.queue.submit([e.finish()]); }
  await rb.mapAsync(GPUMapMode.READ); const got=fromF16(new Uint16Array(rb.getMappedRange().slice(0))); rb.unmap();
  const ref=new Float32Array(await (await fetch('models/pathA/ref/logits_ref.f32')).arrayBuffer());
  md=0; for(let i=0;i<outN;i++){const d=Math.abs(got[i]-ref[i]); if(d>md)md=d;}
  const N2=outN/2; let agree=0; for(let i=0;i<N2;i++){ if(Math.sign(got[N2+i]-got[i])===Math.sign(ref[N2+i]-ref[i])) agree++; }
  sign=agree/N2;
  log(`VALIDATE full graph vs ORT: max|diff| ${md.toFixed(3)} | mask sign-agree ${(sign*100).toFixed(2)}%`);
  log(sign>0.99?'PIPELINE CORRECT ✓':'MISMATCH ✗');

  if(new URLSearchParams(location.search).has('dbg')){
    const dbg=await (await fetch('models/pathA/ref/dbg/dbg.json')).json();
    // order checkpoints by node index
    const order=graph.nodes.map(n=>n.out[0]);
    const entries=Object.entries(dbg.manifest).sort((a,b)=>order.indexOf(a[0])-order.indexOf(b[0]));
    log('\n--- per-checkpoint max|diff| (in graph order) ---');
    for(const [name,info] of entries){
      const nBytes=info.shape.reduce((a,b)=>a*b,1)*2;
      const rbx=dev.createBuffer({size:nBytes,usage:U.MAP_READ|U.COPY_DST});
      const e=dev.createCommandEncoder(); e.copyBufferToBuffer(T[name],0,rbx,0,nBytes); dev.queue.submit([e.finish()]);
      await rbx.mapAsync(GPUMapMode.READ); const gt=fromF16(new Uint16Array(rbx.getMappedRange().slice(0))); rbx.unmap();
      const rf=new Float32Array(await (await fetch('models/pathA/ref/dbg/'+info.file)).arrayBuffer());
      let mx=0; for(let i=0;i<gt.length;i++){const d=Math.abs(gt[i]-rf[i]); if(d>mx)mx=d;}
      log(`  ${mx.toExponential(2).padStart(9)}  ${name}`);
    }
  }
  } // !NOTEST

  // timing
  const iters=10, times=[];
  for(let it=0;it<iters;it++){ const t0=performance.now(); const enc=dev.createCommandEncoder(); runOnce(enc); dev.queue.submit([enc.finish()]); await dev.queue.onSubmittedWorkDone(); times.push(performance.now()-t0); }
  times.sort((a,b)=>a-b); const med=times[times.length>>1];
  log(`per-click (custom WGSL, ${P}^3): median ${med.toFixed(1)} ms (min ${times[0].toFixed(1)})`);
  POST({patch:P, fused, maxdiff:md, signAgree:sign, medianMs:med, minMs:times[0], ok:sign>0.99});
  log('DONE');
}catch(e){ log('ERR '+(e.message||e)); POST({error:String(e.message||e)}); }
})();
</script>
